<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60">
  <rect width="60" height="60" rx="8" fill="#003366"/>
  <g transform="translate(30,30)">
    <!-- Scales of justice base -->
    <line x1="0" y1="-18" x2="0" y2="14" stroke="#fff" stroke-width="2.5"/>
    <line x1="-16" y1="-14" x2="16" y2="-14" stroke="#fff" stroke-width="2.5"/>
    <!-- Left pan -->
    <line x1="-16" y1="-14" x2="-16" y2="-4" stroke="#fff" stroke-width="1.5"/>
    <path d="M-22,-4 A6,3 0 0,0 -10,-4" fill="none" stroke="#fff" stroke-width="1.5"/>
    <!-- Right pan -->
