name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint:all
      - run: pnpm run build:all
      - run: pnpm run test:all
      - run: pnpm run test:structural
      - run: node scripts/verify-packages.js
      - name: Commit updated dist/ files
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/dist/
          if git diff --cached --quiet; then
            echo "No dist/ changes to commit"
          else
            git commit -m "chore: update dist/ build artifacts [skip ci]"
            git push
          fi

  integration:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:all
      - name: Start n8n test container
        run: docker compose -f docker-compose.test.yml -p n8n-integration-test up -d --wait
      - name: Run integration tests
        run: npx jest --config jest.config.integration.js
      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.test.yml -p n8n-integration-test down --volumes --remove-orphans
