version: '3.8'

services:
  n8n:
    image: n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=twoje_haslo
      - GENERIC_TIMEZONE=Europe/Warsaw
      - TZ=Europe/Warsaw
      - N8N_CUSTOM_EXTENSIONS=/custom-nodes/node_modules
    volumes:
      - n8n_data:/home/node/.n8n
      - ./packages/n8n-nodes-ceidg:/custom-nodes/node_modules/n8n-nodes-ceidg
      - ./packages/n8n-nodes-smsapi:/custom-nodes/node_modules/n8n-nodes-smsapi

volumes:
  n8n_data:
